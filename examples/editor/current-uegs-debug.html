<!DOCTYPE html>
<html data-viewer-mode="debug">
<head>
  <meta charset="utf-8">
  <title>Spark • Current UEGS Debug Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    #viewer-frame {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    #viewer-status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 13px;
    }
    #viewer-status[data-error="1"] {
      background: rgba(120, 0, 0, 0.82);
    }
  </style>
</head>
<body>
  <div id="viewer-status">Loading current debug viewer…</div>
  <iframe id="viewer-frame" title="Current debug viewer"></iframe>
  <script type="module" src="/examples/editor/current-uegs-viewer-bootstrap.js"></script>
</body>
</html>
