<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Spark • Current UEGS Compare Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(8, 8, 8, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
    }
    #toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar select,
    #toolbar button {
      background: #111;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
    }
    #viewer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      height: calc(100% - 54px);
    }
    .panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .panel:last-child {
      border-right: 0;
    }
    .panel-title {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.68);
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    iframe {
      display: block;
      flex: 0 0 auto;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      border: 0;
      background: #000;
    }
    #status {
      opacity: 0.85;
      min-width: 240px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <strong>Current UEGS compare</strong>
    <label>Debug term
      <select id="debug-view-select"></select>
    </label>
    <label><input type="checkbox" id="sync-camera" checked> Sync camera</label>
    <label><input type="checkbox" id="direct-lighting" checked> Direct</label>
    <label><input type="checkbox" id="sky-lighting" checked> Sky</label>
    <label><input type="checkbox" id="ambient-occlusion" checked> AO</label>
    <label><input type="checkbox" id="baked-shadow" checked> Baked shadow</label>
    <button id="refresh-debug" type="button">Refresh debug</button>
    <span id="status">Loading compare viewer…</span>
  </div>
  <div id="viewer-grid">
    <div class="panel">
      <div class="panel-title">Composite / final-only</div>
      <iframe id="composite-frame" title="Current UEGS composite viewer"></iframe>
    </div>
    <div class="panel">
      <div class="panel-title">Debug / split term</div>
      <iframe id="debug-frame" title="Current UEGS debug viewer"></iframe>
    </div>
  </div>
  <script type="module" src="/examples/editor/current-uegs-compare.js"></script>
</body>
</html>
