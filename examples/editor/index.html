<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Spark • Editor</title>
  <style>
    body {
      margin: 0;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      outline: none; /* Remove default focus outline */
      touch-action: none;
    }
    #main-gui {
      position: absolute;
      top: 5px;
      right: 5px;
    }
    #second-gui {
      position: absolute;
      top: 5px;
      left: 5px;
    }
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: rgba(0, 0, 0, 0.1);
      z-index: 1000;
      display: none;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #45a049);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>

<body>
  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>
  <script src="/examples/js/vendor/stats.js/build/stats.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "/examples/js/vendor/three/build/three.module.js",
        "three/addons/": "/examples/js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "/dist/spark.module.js",
        "lil-gui": "/examples/js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <canvas id="canvas" tabindex="0"></canvas>
  <div id="main-gui"></div>
  <div id="second-gui"></div>
  <input id="file-input" type="file" accept=".ply,.spz,.splat,.ksplat,.zip" multiple="true" style="display: none;" />
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GUI } from "lil-gui";
    import { constructGrid, SparkControls, SparkRenderer, SplatMesh, textSplats, dyno, transcodeSpz, isMobile, isPcSogs, LN_SCALE_MIN, LN_SCALE_MAX, UegsDebugViewMode, getUegsEditorPreviewContract, parseUegsComparisonViewpoint, parseUegsManifest, scaleUegsComparisonViewpointToSceneBounds, loadOptionalUegsBundleFromUrl, attachUegsBundle, configureUegsBundleForMesh, inspectUegsRuntimeTelemetry, setUegsAmbientOcclusionEnabled, setUegsBakedShadowEnabled, setUegsDebugViewMode, setUegsDirectLightingEnabled, setUegsSkyLightingEnabled } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "/examples/js/get-asset-url.js";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 1);

    const canvas = document.getElementById("canvas");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    const spark = new SparkRenderer({ renderer });
    scene.add(spark);

    function handleResize() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    handleResize();
    window.addEventListener("resize", handleResize);

    const frame = new THREE.Group();
    frame.quaternion.set(1, 0, 0, 0);
    scene.add(frame);

    // Keep track of original file bytes for each loaded splat mesh
    const inputs = [];
    let currentComparisonViewpoint = null;
    let currentComparisonManifest = null;
    let currentAppliedComparisonViewpoint = null;

    const grid = new SplatMesh({
      constructSplats: (splats) => constructGrid({
        splats,
        extents: new THREE.Box3(new THREE.Vector3(-10, -10, -10), new THREE.Vector3(10, 10, 10)),
      }),
    });
    grid.opacity = 0;
    scene.add(grid);

    const stats = new Stats();
    document.body.appendChild(stats.dom);
    stats.dom.style.display = "none";

    const gui = new GUI({
      title: "Settings",
      container: document.getElementById("main-gui")
    });
    const secondGui = new GUI({
      title: "Splats",
      container: document.getElementById("second-gui")
    }).close();

    const controls = new SparkControls({ canvas });

    // Setup mouse controls to orbit the camera around
    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enabled = false;
    orbitControls.autoRotate = false;
    orbitControls.autoRotateSpeed = 1.2;
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;
    orbitControls.target.set(0, 0, 0);
    orbitControls.minDistance = 0.1;
    orbitControls.maxDistance = 10;
    const loadedBoundsCenter = new THREE.Vector3();
    let loadedBoundsRadius = 1;
    let loadedBoundsHeight = 0.5;
    let hasLoadedBounds = false;
    let autoRotateRestorePose = null;
    let orbitBeforeAutoRotate = null;

    const fileInput = document.querySelector("#file-input");
    fileInput.onchange = (event) => {
      loadFiles([...event.target.files]);
    };

    const guiOptions = {
      highDevicePixel: !isMobile(),
      stats: false,
      resetOnLoad: true,
      loadOffset: 0,
      initialMaxSh: null,
      uegsDebugViewMode: UegsDebugViewMode.Final,
      uegsDirectLightingEnabled: true,
      uegsSkyLightingEnabled: true,
      uegsAmbientOcclusionEnabled: true,
      uegsBakedShadowEnabled: true,
      openCv: true,
      autoRotate: true,
      orbit: false,
      reversePointerDir: false,
      reversePointerSlide: false,
      backgroundColor: "#000000",
      presentationProfile: "spark-default",
      presentationExposure: 1.0,
      viewBoundingBox: false,
      openFiles: () => {
        fileInput.click();
      },
      loadFromText: "",
      loadFromTextAction: () => {
        if (guiOptions.loadFromText.trim()) {
          const urls = parseURLsFromText(guiOptions.loadFromText);
          if (urls.length > 0) {
            loadFiles(urls);
            guiOptions.loadFromText = ""; // Clear after loading
          } else {
            alert("No valid URLs found in text. URLs must start with http:// or https:// and end with .ply, .spz, .splat, .ksplat, .json, or .zip");
          }
        }
      },
      resetPose: () => {
        resetFrameQuaternion();
        if (
          cameraModeRequested !== "fit" &&
          !explicitCameraRequested &&
          currentComparisonViewpoint
        ) {
          applyComparisonViewpointToCamera(currentComparisonViewpoint);
          return;
        }
        placeStaticCamera();
      },
    };

    const normalizePresentationProfile = (value) => {
      switch ((value ?? "").toLowerCase()) {
        case "ue-truth":
        case "truth":
        case "linear":
        case "linear-truth":
          return "ue-truth";
        case "ue-presentation":
        case "ue":
        case "ue-like":
        case "presentation":
          return "ue-presentation";
        case "spark-default":
        case "spark":
        default:
          return "spark-default";
      }
    };

    const toneMappingName = (value) => {
      switch (value) {
        case THREE.NoToneMapping:
          return "NoToneMapping";
        case THREE.ACESFilmicToneMapping:
          return "ACESFilmicToneMapping";
        case THREE.LinearToneMapping:
          return "LinearToneMapping";
        case THREE.ReinhardToneMapping:
          return "ReinhardToneMapping";
        case THREE.CineonToneMapping:
          return "CineonToneMapping";
        case THREE.AgXToneMapping:
          return "AgXToneMapping";
        case THREE.NeutralToneMapping:
          return "NeutralToneMapping";
        case THREE.CustomToneMapping:
          return "CustomToneMapping";
        default:
          return `Unknown(${value})`;
      }
    };

    function resetFrameQuaternion() {
      if (guiOptions.openCv) {
        frame.quaternion.set(1, 0, 0, 0);
      } else {
        frame.quaternion.set(0, 0, 0, 1);
      }
    }

    // Parse URL query parameters for URLs to load
    function parseURLsFromQuery() {
      const urlParams = new URLSearchParams(window.location.search);
      const urls = [];

      // Get all "url" parameters
      for (const [key, value] of urlParams.entries()) {
        if (key === "url") {
          urls.push(value);
        }
      }

      return urls;
    }

    function parseBooleanQuery(urlParams, ...keys) {
      for (const key of keys) {
        const value = urlParams.get(key);
        if (value === null) {
          continue;
        }
        return value !== "0" && value.toLowerCase() !== "false";
      }
      return null;
    }

    function parseNumberQuery(urlParams, ...keys) {
      for (const key of keys) {
        const value = urlParams.get(key);
        if (value === null) {
          continue;
        }
        const parsed = Number.parseFloat(value);
        if (Number.isFinite(parsed)) {
          return parsed;
        }
      }
      return null;
    }

    function normalizeColorQuery(value) {
      if (!value) {
        return null;
      }
      return value.startsWith("#") ? value : `#${value}`;
    }

    const UEGS_DEBUG_VIEW_OPTIONS = {
      Final: UegsDebugViewMode.Final,
      BaseColor: UegsDebugViewMode.BaseColor,
      DirectLighting: UegsDebugViewMode.DirectLighting,
      AmbientLighting: UegsDebugViewMode.AmbientLighting,
      AmbientOcclusion: UegsDebugViewMode.AmbientOcclusion,
      Metallic: UegsDebugViewMode.Metallic,
      Roughness: UegsDebugViewMode.Roughness,
      Opacity: UegsDebugViewMode.Opacity,
      Shadow: UegsDebugViewMode.Shadow,
      Normal: UegsDebugViewMode.Normal,
      RawNormal: UegsDebugViewMode.RawNormal,
      SerializedColor: UegsDebugViewMode.SerializedColor,
      CapturedSceneColor: UegsDebugViewMode.CapturedSceneColor,
      CapturedTargetBaseColor: UegsDebugViewMode.CapturedTargetBaseColor,
      CapturedTargetNormal: UegsDebugViewMode.CapturedTargetNormal,
      CapturedSceneNormal: UegsDebugViewMode.CapturedSceneNormal,
      CapturedDirectShadowed: UegsDebugViewMode.CapturedDirectShadowed,
      CapturedDirectUnshadowed: UegsDebugViewMode.CapturedDirectUnshadowed,
    };

    function normalizeUegsDebugViewQuery(value) {
      if (value == null || value === "") {
        return null;
      }
      if (/^\d+$/.test(String(value))) {
        const parsed = Number.parseInt(String(value), 10);
        return Number.isFinite(parsed) ? parsed : null;
      }
      const normalized = String(value).toLowerCase().replace(/[^a-z0-9]+/g, "");
      for (const [label, mode] of Object.entries(UEGS_DEBUG_VIEW_OPTIONS)) {
        if (label.toLowerCase().replace(/[^a-z0-9]+/g, "") === normalized) {
          return mode;
        }
      }
      return null;
    }

    const initialUrlParams = new URLSearchParams(window.location.search);
    const initialUegsDebugViewMode = normalizeUegsDebugViewQuery(
      initialUrlParams.get("uegsDebugView") ?? initialUrlParams.get("debugView"),
    );
    if (initialUegsDebugViewMode !== null) {
      guiOptions.uegsDebugViewMode = initialUegsDebugViewMode;
    }
    const initialUegsDirectLighting = parseBooleanQuery(
      initialUrlParams,
      "uegsDirectLighting",
      "directLighting",
    );
    if (initialUegsDirectLighting !== null) {
      guiOptions.uegsDirectLightingEnabled = initialUegsDirectLighting;
    }
    const initialUegsSkyLighting = parseBooleanQuery(
      initialUrlParams,
      "uegsSkyLighting",
      "skyLighting",
    );
    if (initialUegsSkyLighting !== null) {
      guiOptions.uegsSkyLightingEnabled = initialUegsSkyLighting;
    }
    const initialUegsAmbientOcclusion = parseBooleanQuery(
      initialUrlParams,
      "uegsAmbientOcclusion",
      "ambientOcclusion",
    );
    if (initialUegsAmbientOcclusion !== null) {
      guiOptions.uegsAmbientOcclusionEnabled = initialUegsAmbientOcclusion;
    }
    const initialUegsBakedShadow = parseBooleanQuery(
      initialUrlParams,
      "uegsBakedShadow",
      "bakedShadow",
    );
    if (initialUegsBakedShadow !== null) {
      guiOptions.uegsBakedShadowEnabled = initialUegsBakedShadow;
    }
    const initialUegsDebugUi =
      parseBooleanQuery(initialUrlParams, "uegsDebugUi", "debugUi") ?? false;
    const initialAutoRotate = parseBooleanQuery(
      initialUrlParams,
      "autoRotate",
    );
    if (initialAutoRotate !== null) {
      guiOptions.autoRotate = initialAutoRotate;
    }
    const initialOrbit = parseBooleanQuery(
      initialUrlParams,
      "orbit",
      "orbitControls",
    );
    if (initialOrbit !== null) {
      guiOptions.orbit = initialOrbit;
    }
    const cameraModeRequested =
      (initialUrlParams.get("camera") ?? initialUrlParams.get("cameraMode") ?? "manifest").toLowerCase() === "fit"
        ? "fit"
        : "manifest";
    const explicitCameraRequested = [
      "x",
      "y",
      "z",
      "qx",
      "qy",
      "qz",
      "qw",
      "fov",
    ].some((key) => initialUrlParams.get(key) !== null);

    async function loadUegsManifestForSpzUrl(url, explicitManifestUrl = null) {
      try {
        if (explicitManifestUrl) {
          const response = await fetch(new URL(explicitManifestUrl, window.location.href), {
            mode: "cors",
            cache: "default",
          });
          if (response.ok) {
            return parseUegsManifest(await response.text());
          }
        }

        const assetUrl = new URL(url, window.location.href);
        if (!assetUrl.pathname.toLowerCase().endsWith(".spz")) {
          return null;
        }
        const manifestUrl = new URL("uegs_manifest.json", assetUrl);
        const response = await fetch(manifestUrl, {
          mode: "cors",
          cache: "default",
        });
        if (!response.ok) {
          return null;
        }
        return parseUegsManifest(await response.text());
      } catch {
        return null;
      }
    }

    function applyComparisonViewpointToCamera(comparisonViewpoint) {
      if (!comparisonViewpoint) {
        currentAppliedComparisonViewpoint = null;
        return false;
      }
      camera.position.set(
        comparisonViewpoint.positionX,
        comparisonViewpoint.positionY,
        comparisonViewpoint.positionZ,
      );
      camera.quaternion.set(
        comparisonViewpoint.quaternionX,
        comparisonViewpoint.quaternionY,
        comparisonViewpoint.quaternionZ,
        comparisonViewpoint.quaternionW,
      ).normalize();
      if (Number.isFinite(comparisonViewpoint.verticalFovDegrees)) {
        camera.fov = comparisonViewpoint.verticalFovDegrees;
      }
      const bounds = hasLoadedBounds ? getLoadedSplatBounds() : null;
      if (hasLoadedBounds) {
        orbitControls.target.copy(loadedBoundsCenter);
      }
      if (!applyBoundsClipPlanes(bounds)) {
        camera.updateProjectionMatrix();
      }
      orbitControls.update();
      currentAppliedComparisonViewpoint = {
        positionX: comparisonViewpoint.positionX,
        positionY: comparisonViewpoint.positionY,
        positionZ: comparisonViewpoint.positionZ,
        quaternionX: comparisonViewpoint.quaternionX,
        quaternionY: comparisonViewpoint.quaternionY,
        quaternionZ: comparisonViewpoint.quaternionZ,
        quaternionW: comparisonViewpoint.quaternionW,
        verticalFovDegrees: comparisonViewpoint.verticalFovDegrees,
        sparkOpenCv: comparisonViewpoint.sparkOpenCv ?? null,
      };
      return true;
    }

    function getLoadedSplatBounds() {
      const meshes = frame.children.filter((child) => child instanceof SplatMesh);
      if (meshes.length === 0) {
        return null;
      }
      const bounds = new THREE.Box3();
      let initialized = false;
      for (const mesh of meshes) {
        const meshBounds = mesh.getBoundingBox(true);
        if (meshBounds.isEmpty()) {
          continue;
        }
        if (!initialized) {
          bounds.copy(meshBounds);
          initialized = true;
        } else {
          bounds.union(meshBounds);
        }
      }
      return initialized ? bounds : null;
    }

    function applyBoundsClipPlanes(bounds) {
      if (!bounds || bounds.isEmpty()) {
        return false;
      }
      const sphere = bounds.getBoundingSphere(new THREE.Sphere());
      const radius = Math.max(sphere.radius, 0.01);
      const distance = Math.max(
        radius / Math.sin(THREE.MathUtils.degToRad(camera.fov) * 0.5),
        radius * 2.5,
        0.25,
      );
      camera.near = Math.max(distance / 1000, 0.001);
      camera.far = Math.max(distance * 1000, radius * 10, 1000);
      camera.updateProjectionMatrix();
      return true;
    }

    function refreshLoadedBoundsCameraRig() {
      const bounds = getLoadedSplatBounds();
      if (!bounds || bounds.isEmpty()) {
        hasLoadedBounds = false;
        orbitControls.target.set(0, 0, 0);
        orbitControls.minDistance = 0.1;
        orbitControls.maxDistance = 10;
        controls.fpsMovement.moveSpeed = 4;
        return null;
      }
      hasLoadedBounds = true;
      bounds.getCenter(loadedBoundsCenter);
      const size = bounds.getSize(new THREE.Vector3());
      const radius = Math.max(size.length() * 0.45, 1);
      loadedBoundsRadius = Math.max(radius * 1.5, 2);
      loadedBoundsHeight = Math.max(size.y * 0.3, radius * 0.15);
      orbitControls.target.copy(loadedBoundsCenter);
      orbitControls.minDistance = Math.max(loadedBoundsRadius * 0.2, 0.1);
      orbitControls.maxDistance = Math.max(loadedBoundsRadius * 8, 10);
      controls.fpsMovement.moveSpeed = Math.max(loadedBoundsRadius * 0.12, 6);
      return bounds;
    }

    function applyCameraControlMode({ focusCanvas = true } = {}) {
      refreshLoadedBoundsCameraRig();
      const orbitLikeMode = guiOptions.orbit || guiOptions.autoRotate;
      orbitControls.enabled = orbitLikeMode;
      orbitControls.autoRotate = guiOptions.autoRotate;
      controls.pointerControls.enable = !orbitLikeMode;
      rotX.enable(!orbitLikeMode);
      rotY.enable(!orbitLikeMode);
      rotZ.enable(!orbitLikeMode);
      orbitControls.update();
      if (focusCanvas) {
        canvas.focus();
      }
    }

    function setAutoRotateEnabled(value) {
      const enabled = Boolean(value);
      if (enabled === guiOptions.autoRotate) {
        return guiOptions.autoRotate;
      }

      if (enabled) {
        autoRotateRestorePose = getEditorCameraPose();
        orbitBeforeAutoRotate = guiOptions.orbit;
        guiOptions.orbit = true;
        guiOptions.autoRotate = true;
        applyCameraControlMode();
        return guiOptions.autoRotate;
      }

      guiOptions.autoRotate = false;
      orbitControls.autoRotate = false;
      if (autoRotateRestorePose) {
        setEditorCameraPose(autoRotateRestorePose);
      }
      autoRotateRestorePose = null;
      if (typeof orbitBeforeAutoRotate === "boolean") {
        guiOptions.orbit = orbitBeforeAutoRotate;
      }
      orbitBeforeAutoRotate = null;

      applyCameraControlMode();
      return guiOptions.autoRotate;
    }

    function placeStaticCamera() {
      currentAppliedComparisonViewpoint = null;
      const bounds = refreshLoadedBoundsCameraRig();
      if (bounds && hasLoadedBounds) {
        camera.position.set(
          loadedBoundsCenter.x + loadedBoundsRadius,
          loadedBoundsCenter.y + loadedBoundsHeight,
          loadedBoundsCenter.z + loadedBoundsRadius,
        );
        camera.lookAt(loadedBoundsCenter);
        applyBoundsClipPlanes(bounds);
        orbitControls.update();
        return true;
      }
      camera.position.set(0, 0, 1);
      camera.quaternion.set(0, 0, 0, 1);
      camera.fov = 75;
      camera.near = 0.01;
      camera.far = 1000;
      camera.updateProjectionMatrix();
      orbitControls.update();
      return false;
    }

    // Parse and apply camera parameters from URL
    function applyCameraFromQuery() {
      const urlParams = new URLSearchParams(window.location.search);

      // Position parameters
      const x = urlParams.get('x');
      const y = urlParams.get('y');
      const z = urlParams.get('z');

      if (x !== null || y !== null || z !== null) {
        currentAppliedComparisonViewpoint = null;
        camera.position.set(
          x !== null ? parseFloat(x) : camera.position.x,
          y !== null ? parseFloat(y) : camera.position.y,
          z !== null ? parseFloat(z) : camera.position.z
        );
      }

      // Quaternion parameters
      const qx = urlParams.get('qx');
      const qy = urlParams.get('qy');
      const qz = urlParams.get('qz');
      const qw = urlParams.get('qw');

      if (qx !== null || qy !== null || qz !== null || qw !== null) {
        currentAppliedComparisonViewpoint = null;
        camera.quaternion.set(
          qx !== null ? parseFloat(qx) : camera.quaternion.x,
          qy !== null ? parseFloat(qy) : camera.quaternion.y,
          qz !== null ? parseFloat(qz) : camera.quaternion.z,
          qw !== null ? parseFloat(qw) : camera.quaternion.w
        ).normalize();
      }

      const fov = urlParams.get("fov");
      if (fov !== null) {
        currentAppliedComparisonViewpoint = null;
        camera.fov = parseFloat(fov);
        camera.updateProjectionMatrix();
      }

      const openCv = parseBooleanQuery(urlParams, "openCv", "opencv");
      if (openCv !== null) {
        guiOptions.openCv = openCv;
        resetFrameQuaternion();
      }

      const backgroundColor = normalizeColorQuery(
        urlParams.get("bg") ?? urlParams.get("background")
      );
      if (backgroundColor) {
        guiOptions.backgroundColor = backgroundColor;
      }

      const maxSh = urlParams.get("maxSh");
      if (maxSh !== null) {
        const parsedMaxSh = parseInt(maxSh, 10);
        if (Number.isFinite(parsedMaxSh)) {
          guiOptions.initialMaxSh = Math.max(0, Math.min(3, parsedMaxSh));
        }
      }

      guiOptions.presentationProfile = normalizePresentationProfile(
        urlParams.get("presentation") ?? urlParams.get("presentationProfile"),
      );
      const presentationExposure =
        Number.parseFloat(
          urlParams.get("presentationExposure") ?? urlParams.get("exposure"),
        );
      if (Number.isFinite(presentationExposure)) {
        guiOptions.presentationExposure = THREE.MathUtils.clamp(
          presentationExposure,
          0.25,
          2.5,
        );
      }

      const hideUiRequested = parseBooleanQuery(urlParams, "hideUi", "ui");
      if (hideUiRequested === false) {
        document.getElementById("main-gui").style.display = "none";
        document.getElementById("second-gui").style.display = "none";
        stats.dom.style.display = "none";
        document.getElementById("progress-bar").style.display = "none";
      }
    }

    function applyViewpointFromQuery() {
      const urlParams = new URLSearchParams(window.location.search);
      const sortRadial = parseBooleanQuery(urlParams, "sortRadial");
      const sort32 = parseBooleanQuery(urlParams, "sort32");
      const stochastic = parseBooleanQuery(urlParams, "stochastic");
      const opaqueShellCoverage = parseBooleanQuery(urlParams, "opaqueShellCoverage");
      const premultipliedAlpha = parseBooleanQuery(urlParams, "premultipliedAlpha");
      const preBlurAmount = parseNumberQuery(urlParams, "preBlurAmount");
      const blurAmount = parseNumberQuery(urlParams, "blurAmount");
      const minAlpha = parseNumberQuery(urlParams, "minAlpha");

      if (sortRadial !== null) {
        spark.defaultView.sortRadial = sortRadial;
      }
      if (sort32 !== null) {
        spark.defaultView.sort32 = sort32;
      }
      if (stochastic !== null) {
        spark.defaultView.stochastic = stochastic;
      }
      if (opaqueShellCoverage !== null) {
        spark.opaqueShellCoverage = opaqueShellCoverage;
        if (spark.renderContractBaseline) {
          spark.renderContractBaseline.opaqueShellCoverage = opaqueShellCoverage;
        }
      }
      if (premultipliedAlpha !== null) {
        spark.premultipliedAlpha = premultipliedAlpha;
      }
      if (preBlurAmount !== null) {
        spark.preBlurAmount = preBlurAmount;
      }
      if (blurAmount !== null) {
        spark.blurAmount = blurAmount;
      }
      if (minAlpha !== null) {
        spark.minAlpha = minAlpha;
      }
    }

    // Apply camera parameters from URL
    guiOptions.resetPose();
    applyCameraFromQuery();

    const cameraFolder = gui.addFolder("Camera");
    const cameraPose = cameraFolder.addFolder("Camera Pose");
    cameraPose.add(camera.position, "x", -10, 10, 0.01).name("X").listen();
    cameraPose.add(camera.position, "y", -10, 10, 0.01).name("Y").listen();
    cameraPose.add(camera.position, "z", -10, 10, 0.01).name("Z").listen();
    const rotX = cameraPose.add(camera.rotation, "x", -Math.PI, Math.PI, 0.01).name("RotateX").listen();
    const rotY = cameraPose.add(camera.rotation, "y", -Math.PI, Math.PI, 0.01).name("RotateY").listen();
    const rotZ = cameraPose.add(camera.rotation, "z", -Math.PI, Math.PI, 0.01).name("RotateZ").listen();
    cameraPose.add(camera, "fov", 1, 179, 1).name("Fov Y degrees").listen().onChange((value) => {
      camera.updateProjectionMatrix();
    });
    cameraPose.close();

    function touch() {
      spark.needsUpdate = true;
    }

    const progressFill = document.getElementById('progress-fill');

    function showProgress() {
      progressBar.style.display = "block";
      progressFill.style.width = "0%";
    }

    function updateProgress(progress) {
      progressFill.style.width = `${Math.min(100, Math.max(0, progress * 100))}%`;
    }

    function hideProgress() {
      progressBar.style.display = "none";
    }

    // Calculate progress when total size is unknown
    function calculateUnknownProgress(loadedBytes) {
      const midpointMB = 10 * 1024 * 1024; // 10 MB in bytes
      return loadedBytes / (loadedBytes + midpointMB);
    }

    async function fetchWithProgress(url) {
      try {
        const response = await fetch(url, {
          mode: "cors",
          cache: "default",
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength, 10) : null;

        const reader = response.body.getReader();
        const chunks = [];
        let loadedBytes = 0;

        while (true) {
          const { done, value } = await reader.read();

          if (done) break;

          chunks.push(value);
          loadedBytes += value.length;

          // Calculate progress
          let progress;
          if (total) {
            progress = loadedBytes / total;
          } else {
            progress = calculateUnknownProgress(loadedBytes);
          }

          updateProgress(progress);
        }

        // Combine all chunks into a single Uint8Array
        const allChunks = new Uint8Array(loadedBytes);
        let offset = 0;
        for (const chunk of chunks) {
          allChunks.set(chunk, offset);
          offset += chunk.length;
        }

        return allChunks.buffer;
      } catch (error) {
        // Hide progress bar on error
        hideProgress();

        // Detect CORS issues
        if (error instanceof TypeError && (
          error.message.includes('Failed to fetch') ||
          error.message.includes('Network request failed') ||
          error.message.includes('CORS') ||
          error.message.includes('cross-origin')
        )) {
          alert(`CORS Error: Cannot load file from ${url}\n\nThe server doesn't allow cross-origin requests. The file needs to be:\n• Served from the same domain, or\n• The server must include CORS headers like:\n  Access-Control-Allow-Origin: *`);
        } else if (error.message.includes('HTTP error! status:')) {
          const status = error.message.match(/status: (\d+)/)?.[1];
          alert(`HTTP Error ${status}: Cannot load file from ${url}\n\n${error.message}`);
        } else {
          alert(`Error loading file from ${url}:\n\n${error.message}`);
        }

        throw error; // Re-throw so loadFiles can handle it
      }
    }

    async function loadFiles(splatFiles) {
      if (guiOptions.resetOnLoad) {
        const toRemove = frame.children.filter((child) => child instanceof SplatMesh || child instanceof THREE.Box3Helper);

          frame.remove(child);

        splatsFolder.foldersRecursive().forEach((child) => child.destroy());
      }

      const urlParams = new URLSearchParams(window.location.search);
      const openCvOverride = parseBooleanQuery(urlParams, "openCv", "opencv");
      const firstUrl = splatFiles.find((file) => typeof file === "string") ?? null;
      const manifestOverrideUrl = urlParams.get("manifest");
      const comparisonManifest =
        !explicitCameraRequested && typeof firstUrl === "string"
          ? await loadUegsManifestForSpzUrl(firstUrl, manifestOverrideUrl)
          : null;
      const comparisonViewpoint =
        !explicitCameraRequested ? parseUegsComparisonViewpoint(comparisonManifest) : null;
      currentComparisonViewpoint = comparisonViewpoint;
      currentComparisonManifest = comparisonManifest;
      applyUegsEditorPreviewContract(comparisonManifest);
      guiOptions.openCv = true;
      guiOptions.autoRotate = initialAutoRotate ?? false;
      guiOptions.orbit = initialOrbit ?? Boolean(comparisonViewpoint);

      if (openCvOverride !== null) {

        guiOptions.openCv = comparisonViewpoint.sparkOpenCv;
      }
      resetFrameQuaternion();
      writeOptions.filename = "";

      // Show progress bar if loading from URLs
      const hasUrls = splatFiles.some(file => typeof file === "string");
      if (hasUrls) {
        showProgress();
      }

      let index = 0;
      for (const splatFile of splatFiles) {
        try {
          let fileBytes;
          let fileName;
          let url = null;
          let bundleUrl = null;

          // Check if splatFile is a URL string or a File object
          if (typeof splatFile === "string") {
            bundleUrl = splatFile;
            // It's a URL, fetch it
            console.log(`Fetching ${splatFile}...`);
            fileBytes = new Uint8Array(await fetchWithProgress(splatFile));
            // Extract filename from URL
            fileName = splatFile.split("/").pop().split("?")[0] || "downloaded-file";

            if (isPcSogs(fileBytes)) {
              url = splatFile;
            }
          } else {
            // It's a File object
            fileBytes = new Uint8Array(await splatFile.arrayBuffer());
            fileName = splatFile.name;
          }

          if (writeOptions.filename === "") {
            writeOptions.filename = fileName.split(".")[0];
          }

          const init = url ? { url } : { fileBytes: fileBytes.slice(), fileName };
          init.splatEncoding = { ...splatEncoding };
          const splatMesh = new SplatMesh(init);
          const translate = guiOptions.loadOffset * index
          splatMesh.position.set(translate, 0.5 * translate, 0.1 * translate);
          splatMesh.enableWorldToView = true;
          splatMesh.worldModifier = makeWorldModifier(splatMesh);
          await splatMesh.initialized;
          if (bundleUrl) {
            const uegsBundle = await loadOptionalUegsBundleFromUrl(bundleUrl);
            if (uegsBundle) {
              attachUegsBundle(splatMesh.packedSplats, uegsBundle);
              configureUegsBundleForMesh(splatMesh);
            }
          }
          const skipInitialMaxShForAutoConfiguredUegs = Boolean(
            splatMesh.packedSplats?.extra?.uegsAutoConfigured,
          );
          if (
            guiOptions.initialMaxSh !== null &&
            !skipInitialMaxShForAutoConfiguredUegs
          ) {
            splatMesh.maxSh = guiOptions.initialMaxSh;
            splatMesh.updateGenerator();
          }
          applyUegsDebugOptionsToMesh(splatMesh);

          if (!url) {
            // PC SOGS transcode not supported yet
            inputs.push({ fileBytes, pathOrUrl: fileName, object: splatMesh });
          }
          frame.add(splatMesh);
          console.log(`Loaded ${fileName} with ${splatMesh.numSplats} splats`);
          addBoundingBoxHelper(splatMesh);

          const splatFolder = splatsFolder.addFolder(fileName).close();
          splatFolder.add(splatMesh, "opacity", 0, 1, 0.01).name("Opacity").listen();
          splatFolder.add(splatMesh.position, "x", -10, 10, 0.01).name("X").listen();
          splatFolder.add(splatMesh.position, "y", -10, 10, 0.01).name("Y").listen();
          splatFolder.add(splatMesh.position, "z", -10, 10, 0.01).name("Z").listen();
          splatFolder.add(splatMesh.scale, "x", 0.01, 4, 0.01).name("Scale").listen().onChange((value) => {
            splatMesh.scale.setScalar(value);

          splatFolder.add(splatMesh.rotation, "x", -Math.PI, Math.PI, 0.01).name("RotateX").listen();
          splatFolder.add(splatMesh.rotation, "y", -Math.PI, Math.PI, 0.01).name("RotateY").listen();
          splatFolder.add(splatMesh.rotation, "z", -Math.PI, Math.PI, 0.01).name("RotateZ").listen();
          splatFolder.add(splatMesh, "maxSh", 0, 3, 1).name("Max SH").listen().onChange(() => {
            splatMesh.updateGenerator();
          });
        } catch (error) {
          console.error("Error loading splat file:", error);
        }
        index += 1;

      // Hide progress bar when done
      if (hasUrls) {
        hideProgress();

      if (
        cameraModeRequested !== "fit" &&

        placeStaticCamera();

      canvas.focus();

    const renderCurrentFrame = () => {

    const readRenderedPixels = () => {
      const width = renderer.domElement.width;
      const height = renderer.domElement.height;
      const target = new THREE.WebGLRenderTarget(width, height, {
        format: THREE.RGBAFormat,
        type: THREE.UnsignedByteType,
      });
      const pixels = new Uint8Array(width * height * 4);
      const previousTarget = renderer.getRenderTarget();
      renderer.setRenderTarget(target);
      renderCurrentFrame();
      renderer.readRenderTargetPixels(target, 0, 0, width, height, pixels);
      renderer.setRenderTarget(previousTarget);
      target.dispose();
      return { width, height, pixels };
    };

    const capturePixelDigest = () => {
      const { width, height, pixels } = readRenderedPixels();
      let hash = 2166136261 >>> 0;
      let lumaSum = 0;
      for (let i = 0; i < pixels.length; i += 4) {
        const r = pixels[i];
        const g = pixels[i + 1];
        const b = pixels[i + 2];
        hash ^= r;
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= g;
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= b;
        hash = Math.imul(hash, 16777619) >>> 0;
        lumaSum += 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      const pixelCount = width * height;
      return {
        width,
        height,
        pixelCount,
        hash32: hash >>> 0,
        meanLuma: pixelCount > 0 ? lumaSum / pixelCount : 0,
      };
    };

    const capturePixelPng = () => {
      const { width, height, pixels } = readRenderedPixels();
      const canvas2d = document.createElement("canvas");
      canvas2d.width = width;
      canvas2d.height = height;
      const context = canvas2d.getContext("2d");
      if (!context) {
        throw new Error("2D canvas context unavailable for capturePixelPng");
      }
      const imageData = context.createImageData(width, height);
      for (let row = 0; row < height; row += 1) {
        const sourceOffset = row * width * 4;
        const targetOffset = (height - row - 1) * width * 4;
        imageData.data.set(
          pixels.subarray(sourceOffset, sourceOffset + width * 4),
          targetOffset,
        );
      }
      context.putImageData(imageData, 0, 0);
      return canvas2d.toDataURL("image/png");
    };

    const capturePixelArtifact = () => {
      const { width, height, pixels } = readRenderedPixels();
      let hash = 2166136261 >>> 0;
      let lumaSum = 0;
      for (let i = 0; i < pixels.length; i += 4) {
        const r = pixels[i];
        const g = pixels[i + 1];
        const b = pixels[i + 2];
        hash ^= r;
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= g;
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= b;
        hash = Math.imul(hash, 16777619) >>> 0;
        lumaSum += 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      const canvas2d = document.createElement("canvas");
      canvas2d.width = width;
      canvas2d.height = height;
      const context = canvas2d.getContext("2d");
      if (!context) {
        throw new Error("2D canvas context unavailable for capturePixelArtifact");
      }
      const imageData = context.createImageData(width, height);
      for (let row = 0; row < height; row += 1) {
        const sourceOffset = row * width * 4;
        const targetOffset = (height - row - 1) * width * 4;
        imageData.data.set(
          pixels.subarray(sourceOffset, sourceOffset + width * 4),
          targetOffset,
        );
      }
      context.putImageData(imageData, 0, 0);
      return {
        digest: {
          width,
          height,
          pixelCount: width * height,
          hash32: hash >>> 0,
          meanLuma: width * height > 0 ? lumaSum / (width * height) : 0,
        },
        pngDataUrl: canvas2d.toDataURL("image/png"),
      };
    };

    const captureCanvasPng = () => {

    const captureCanvasDigest = () => {
      renderCurrentFrame();
      const sourceWidth = renderer.domElement.width;
      const sourceHeight = renderer.domElement.height;
      const maxDimension = 256;
      const scale = Math.min(
        1,
        maxDimension / Math.max(sourceWidth, sourceHeight, 1),
      );
      const sampleWidth = Math.max(1, Math.round(sourceWidth * scale));
      const sampleHeight = Math.max(1, Math.round(sourceHeight * scale));
      const sampleCanvas = document.createElement("canvas");
      sampleCanvas.width = sampleWidth;
      sampleCanvas.height = sampleHeight;
      const sampleContext = sampleCanvas.getContext("2d", {
        willReadFrequently: true,
      });
      if (!sampleContext) {
        throw new Error("2D canvas context unavailable for captureCanvasDigest");
      }
      sampleContext.drawImage(
        renderer.domElement,
        0,
        0,
        sourceWidth,
        sourceHeight,
        0,
        0,
        sampleWidth,
        sampleHeight,
      );
      const pixels = sampleContext.getImageData(
        0,
        0,
        sampleWidth,
        sampleHeight,
      ).data;
      let hash = 2166136261 >>> 0;
      let rgbSum = 0;
      for (let i = 0; i < pixels.length; i += 4) {
        hash ^= pixels[i];
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= pixels[i + 1];
        hash = Math.imul(hash, 16777619) >>> 0;
        hash ^= pixels[i + 2];
        hash = Math.imul(hash, 16777619) >>> 0;
        rgbSum += pixels[i] + pixels[i + 1] + pixels[i + 2];
      }
      return {
        width: sampleWidth,
        height: sampleHeight,
        hash32: hash >>> 0,
        meanRgb:
          rgbSum / Math.max(1, sampleWidth * sampleHeight * 3),
      };
    };

    const splatEncoding = {

    const splatsFolder = secondGui.addFolder("Files");

    const clipFolder = gui.addFolder("Clip Splats").close();

    function updateFrameSplats() {
      frame.children.forEach((child) => {
        if (child instanceof SplatMesh) {
          child.updateVersion();
        }
      });
    }

    const clipEnable = dyno.dynoBool(false);
    const clipMinX = dyno.dynoFloat(-5);
    const clipMaxX = dyno.dynoFloat(5);
    const clipMinY = dyno.dynoFloat(-5);
    const clipMaxY = dyno.dynoFloat(5);
    const clipMinZ = dyno.dynoFloat(-5);
    const clipMaxZ = dyno.dynoFloat(5);
    clipFolder.add(clipEnable, "value").name("Enable clip").onChange(() => updateFrameSplats());
    clipFolder.add(clipMinX, "value", -50, 50, 0.01).name("Min X").onChange(() => updateFrameSplats());
    clipFolder.add(clipMaxX, "value", -50, 50, 0.01).name("Max X").onChange(() => updateFrameSplats());
    clipFolder.add(clipMinY, "value", -50, 50, 0.01).name("Min Y").onChange(() => updateFrameSplats());
    clipFolder.add(clipMaxY, "value", -50, 50, 0.01).name("Max Y").onChange(() => updateFrameSplats());
    clipFolder.add(clipMinZ, "value", -50, 50, 0.01).name("Min Z").onChange(() => updateFrameSplats());
    clipFolder.add(clipMaxZ, "value", -50, 50, 0.01).name("Max Z").onChange(() => updateFrameSplats());

    function makeWorldModifier(mesh) {
      const context = mesh.context;
      return dyno.dynoBlock({ gsplat: dyno.Gsplat }, { gsplat: dyno.Gsplat }, ({ gsplat }) => {
        // Color by world normal if it's enabled
        let worldNormal = dyno.gsplatNormal(gsplat);
        let { rgb, center, opacity } = dyno.splitGsplat(gsplat).outputs;
        // Compute vector from view to object coordinate in gsplat
        const worldToView = context.worldToView;
        const viewGsplat = worldToView.applyGsplat(gsplat);
        const viewCenter = dyno.splitGsplat(viewGsplat).outputs.center;
        let normal = dyno.gsplatNormal(viewGsplat);
        const dot = dyno.dot(viewCenter, normal);
        const sameDir = dyno.greaterThanEqual(dot, dyno.dynoConst("float", 0));
        normal = dyno.select(sameDir, dyno.neg(worldNormal), worldNormal);
        const normalRgb = dyno.add(dyno.mul(normal, dyno.dynoConst("float", 0.5)), dyno.dynoConst("float", 0.5));
        rgb = dyno.select(normalColor, normalRgb, rgb);

        // Zero out opacity if outside clip bounds
        const { x, y, z } = dyno.split(center).outputs;
        const xWithin = dyno.and(dyno.greaterThanEqual(x, clipMinX), dyno.lessThanEqual(x, clipMaxX));
        const yWithin = dyno.and(dyno.greaterThanEqual(y, clipMinY), dyno.lessThanEqual(y, clipMaxY));
        const zWithin = dyno.and(dyno.greaterThanEqual(z, clipMinZ), dyno.lessThanEqual(z, clipMaxZ));
        const within = dyno.and(dyno.and(xWithin, yWithin), zWithin);
        const splatEnabled = dyno.or(
          dyno.not(clipEnable),
          within,
        );
        opacity = dyno.select(splatEnabled, opacity, dyno.dynoConst("float", 0));

        gsplat = dyno.combineGsplat({
          gsplat,
          rgb,
          opacity,
        })
        return { gsplat };
      });
    }

    const exportFolder = secondGui.addFolder("Export Gsplats").close();
    const writeOptions = {
      filename: "gsplats",
      trimOpacity: true,
      trimOpacityThreshold: 0,
      maxSh: 3,
      fractionalBits: 12,
      writeSpz: async () => {
        const transcodeInputs = inputs.map((input) => {
          return {
            fileBytes: new Uint8Array(input.fileBytes),
            pathOrUrl: input.pathOrUrl,
            transform: {
              translate: input.object.position.toArray(),
              quaternion: input.object.quaternion.toArray(),
              scale: (input.object.scale.x + input.object.scale.y + input.object.scale.z) / 3,
            },
          };
        });

        const clipXyz = clipEnable.value ? {
          min: [clipMinX.value, clipMinY.value, clipMinZ.value],
          max: [clipMaxX.value, clipMaxY.value, clipMaxZ.value],
        } : undefined;
        const maxSh = writeOptions.maxSh;
        const fractionalBits = writeOptions.fractionalBits;
        const opacityThreshid = writeOptions.trimOpacity ? writeOptions.trimOpacityThreshold : undefined;
        const transcode = await transcodeSpz({ inputs: transcodeInputs, maxSh, clipXyz, fractionalBits, opacityThreshold: opacityThreshid });

        if (transcode.clippedCount && transcode.clippedCount > 0) {
          console.log(`Clipped ${transcode.clippedCount} splats. Consider decreasing fractional-bits from ${fractionalBits} to reduce clipping.`);
          alert(`Clipped ${transcode.clippedCount} splats. Consider decreasing fractional-bits from ${fractionalBits} to reduce clipping.`);
        }

        const blob = new Blob([transcode.fileBytes], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = writeOptions.filename + ".spz";
        a.click();
        URL.revokeObjectURL(url);
      },
    };
    exportFolder.add(writeOptions, "filename").name("Filename").listen();
    exportFolder.add(writeOptions, "trimOpacity").name("Trim low opacity");
    exportFolder.add(writeOptions, "trimOpacityThreshold").name("Trim opacity <= 0..1");
    exportFolder.add(writeOptions, "maxSh", 0, 3, 1).name("Max spherical harmonics");
    exportFolder.add(writeOptions, "fractionalBits", 6, 24, 1).name("Fractional bits");
    exportFolder.add(writeOptions, "writeSpz").name("Create .spz and download");

    function makeInstructions() {
      const instructions = textSplats({
        text: "Drag and Drop\na Gsplat file\nhere to view",
        textAlign: "center",
        fontSize: 64,
        objectScale: 0.1 / 64,
      });
      instructions.quaternion.set(1, 0, 0, 0);
      instructions.enableWorldToView = true;
      instructions.worldModifier = makeWorldModifier(instructions);
      instructions.updateGenerator();
      return instructions;
    }

    const instructions = makeInstructions();
    addBoundingBoxHelper(instructions);
    frame.add(instructions);

    // Load URLs from query parameters if any
    const urlsToLoad = parseURLsFromQuery();
    if (urlsToLoad.length > 0) {
      console.log(`Loading ${urlsToLoad.length} URLs from query parameters:`, urlsToLoad);
      loadFiles(urlsToLoad);
    }

    // Focus the canvas initially for keyboard controls
    canvas.focus();

    // Drag and drop functionality
    canvas.addEventListener("dragover", (e) => {
      e.preventDefault();
      canvas.style.opacity = "0.5";
    });

    canvas.addEventListener("dragleave", (e) => {
      e.preventDefault();
      canvas.style.opacity = "1";
    });

    canvas.addEventListener("drop", async (e) => {
      e.preventDefault();
      canvas.style.opacity = "1";

      // Check for text data first
      const textData = e.dataTransfer.getData('text/plain');
      if (textData) {
        const urls = parseURLsFromText(textData);
        if (urls.length > 0) {
          console.log(`Found ${urls.length} URLs in dropped text:`, urls);
          loadFiles(urls);
          return;
        }
      }

      // Fallback to file handling
      const files = Array.from(e.dataTransfer.files);
      console.log("Dropped files:", files.length, files);
      const splatFiles = files.filter((file) =>
        file.name.toLowerCase().endsWith('.ply') ||
        file.name.toLowerCase().endsWith('.spz') ||
        file.name.toLowerCase().endsWith('.splat') ||
        file.name.toLowerCase().endsWith('.ksplat') ||
        file.name.toLowerCase().endsWith('.zip') ||
        file.name.toLowerCase().endsWith('.sog')
      );

      if (splatFiles.length > 0) {
        loadFiles(splatFiles);
      }
    });

    // Parse URLs from text (handles single URLs, multiple lines, mixed content)
    function parseURLsFromText(text) {
      const supportedExtensions = [".ply", ".spz", ".splat", ".ksplat", ".zip", ".json"];
      const urls = [];

      // Split by lines, commas, and semicolons
      const parts = text.trim().split(/[\r\n,;]+/);

      for (const part of parts) {
        const trimmed = part.trim();

        // Check if part looks like a URL
        if (trimmed.startsWith('http://') || trimmed.startsWith('https://')) {
          // Check if it has a supported extension
          const hasValidExtension = supportedExtensions.some(ext =>
            trimmed.toLowerCase().includes(ext)
          );

          if (hasValidExtension) {
            urls.push(trimmed);
          }
        }
      }

      return urls;
    }

    let lastTime = null;

    renderer.setAnimationLoop(function animate(time) {
      const deltaTime = lastTime === null ? 0 : Math.max((time - lastTime) * 0.001, 0);
      lastTime = time;
      stats.begin();

      controls.fpsMovement.update(deltaTime, camera);
      controls.pointerControls.update(deltaTime, camera);
      if (guiOptions.orbit || guiOptions.autoRotate) {
        orbitControls.update();
      }

      renderCurrentFrame();

      stats.end();
    });
